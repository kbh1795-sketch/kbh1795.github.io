<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kim Byunghee | Personal Homepage</title>
  <meta name="description" content="Personal homepage of Kim Byunghee." />
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #171717;
      --muted: #656565;
      --line: #dedad0;
      --ink: #203028;
      --accent: #2f6f5e;
      --accent-soft: #e7f0ea;
      --warm: #b9852b;
      --warm-soft: #f4ead9;
      --radius: 8px;
      --shadow: 0 16px 40px rgba(32, 48, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 32px 24px 56px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 64px;
    }

    .brand {
      font-size: 18px;
      font-weight: 760;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 620;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 44px;
      align-items: center;
      margin-bottom: 76px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 760;
    }

    .eyebrow svg,
    .link-icon {
      width: 18px;
      height: 18px;
      flex: none;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(44px, 7vw, 76px);
      font-weight: 820;
    }

    .subtitle {
      margin: 22px 0 0;
      max-width: 680px;
      color: #2f3d36;
      font-size: clamp(21px, 3vw, 30px);
      font-weight: 700;
      line-height: 1.32;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 760;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #ffffff;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .meta-link {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 620;
    }

    .meta-link:hover {
      color: var(--accent);
    }

    section {
      display: grid;
      grid-template-columns: 0.34fr 1fr;
      gap: 36px;
      margin-bottom: 72px;
    }

    h2 {
      font-size: 26px;
      font-weight: 790;
    }

    .section-kicker {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 26px;
    }

    .experience-card {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .role-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      border: 1px solid transparent;
    }

    .role-icon svg {
      width: 30px;
      height: 30px;
    }

    .role-icon.army {
      background: var(--accent-soft);
      border-color: #c9ded2;
      color: var(--accent);
    }

    .role-icon.education {
      background: var(--warm-soft);
      border-color: #e5d1aa;
      color: var(--warm);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    h3 {
      font-size: 19px;
      font-weight: 760;
    }

    .org,
    .period {
      color: var(--muted);
      font-size: 14px;
      font-weight: 630;
    }

    .period {
      white-space: nowrap;
    }

    .footer {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 860px) {
      .nav-links {
        display: none;
      }

      .hero,
      section {
        grid-template-columns: 1fr;
      }

      .item-top {
        flex-direction: column;
        gap: 4px;
      }

      .period {
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      .container {
        padding-left: 18px;
        padding-right: 18px;
      }

      .experience-card {
        grid-template-columns: 1fr;
      }

      .role-icon {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <nav class="nav" aria-label="Primary">
      <a href="#" class="brand">Kim Byunghee</a>
      <div class="nav-links">
        <a href="#experience">Experience</a>
      </div>
    </nav>

    <header class="hero">
      <div>
        <div class="eyebrow">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z" />
          </svg>
          Republic of Korea
        </div>
        <h1>Kim Byunghee</h1>
        <div class="actions">
          <a href="https://www.linkedin.com/in/byunghee-kim-247260330/" target="_blank" rel="noreferrer" class="btn btn-primary">
            <svg class="link-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5ZM.32 8h4.35v14H.32V8Zm7.04 0h4.17v1.91h.06c.58-1.1 2-2.26 4.12-2.26C20.12 7.65 21 10.55 21 14.32V22h-4.35v-6.81c0-1.62-.03-3.71-2.26-3.71-2.27 0-2.62 1.77-2.62 3.59V22H7.36V8Z" />
            </svg>
            LinkedIn
          </a>
        </div>
      </div>
    </header>

    <section id="experience">
      <div>
        <h2>Experience</h2>
      </div>
      <div class="stack">
        <article class="card experience-card">
          <div class="role-icon army" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path fill="currentColor" d="M12 2 4.5 5.2v5.7c0 4.8 3.2 9.3 7.5 11.1 4.3-1.8 7.5-6.3 7.5-11.1V5.2L12 2Zm0 3.2 4.9 2.1v3.6c0 3.2-1.9 6.3-4.9 7.9-3-1.6-4.9-4.7-4.9-7.9V7.3L12 5.2Zm0 2.1-1.2 2.4-2.7.4 1.9 1.9-.4 2.7 2.4-1.3 2.4 1.3-.4-2.7 1.9-1.9-2.7-.4L12 7.3Z" />
            </svg>
          </div>
          <div class="item-top">
            <div>
              <h3>Logistics / Supply Control Officer</h3>
              <div class="org">Republic of Korea Army</div>
            </div>
            <div class="period">Present</div>
          </div>
        </article>
      </div>
    </section>

    <footer class="footer">
      &copy; 2026 Kim Byunghee. All rights reserved.
    </footer>
  </div>
</body>
</html>
